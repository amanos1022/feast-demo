# kafka-cluster.yaml  (KRaft mode, single broker for local)
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata: { name: brokers, namespace: data, labels: { strimzi.io/cluster: music } }
spec:
  replicas: 1
  roles: [broker, controller]
  storage: { type: ephemeral }
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: music
  namespace: data
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.2.0
    listeners:
      - { name: plain, port: 9092, type: internal, tls: false }
      - name: external
        port: 9094
        type: cluster-ip
        tls: false
        configuration:
          brokers:
            - broker: 0
              advertisedHost: localhost
              advertisedPort: 9094
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator: { topicOperator: {}, userOperator: {} }
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  { name: plays, namespace: data, labels: { strimzi.io/cluster: music } }
spec: { partitions: 6, replicas: 1 }
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  {
    name: served-features,
    namespace: data,
    labels: { strimzi.io/cluster: music },
  }
spec: { partitions: 6, replicas: 1 }
